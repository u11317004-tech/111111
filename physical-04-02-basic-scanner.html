<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>04-02 基礎掃描器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>body { font-family: Inter, sans-serif; }</style>
  </head>
  <body class="min-h-screen bg-slate-950 p-6 text-slate-100">
    <a class="text-cyan-400 hover:text-lime-400" href="index.html">← 返回課程表</a>
    <div class="mx-auto mt-6 max-w-3xl">
      <h1 class="mb-4 text-xl font-semibold">練習 04-02｜jsQR 基礎掃描</h1>
      <button id="start" class="mb-4 rounded-xl border border-cyan-400/50 bg-cyan-500/10 px-4 py-2 text-sm text-cyan-200">
        開啟攝影機
      </button>
      <div class="relative inline-block">
        <video id="video" class="hidden" playsinline muted></video>
        <canvas id="canvas" class="max-h-[70vh] rounded-lg border border-cyan-500/30 bg-black"></canvas>
      </div>
      <p id="out" class="mt-4 font-mono text-sm text-lime-400"></p>
    </div>
    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const out = document.getElementById("out");

      function drawCornerPath(loc) {
        const c = loc;
        ctx.beginPath();
        ctx.strokeStyle = "#22d3ee";
        ctx.lineWidth = 3;
        ctx.moveTo(c.topLeftCorner.x, c.topLeftCorner.y);
        ctx.lineTo(c.topRightCorner.x, c.topRightCorner.y);
        ctx.lineTo(c.bottomRightCorner.x, c.bottomRightCorner.y);
        ctx.lineTo(c.bottomLeftCorner.x, c.bottomLeftCorner.y);
        ctx.closePath();
        ctx.stroke();
      }

      function loop() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
          if (code) {
            drawCornerPath(code.location);
            out.textContent = "內容：" + code.data;
          } else {
            out.textContent = "未偵測到條碼";
          }
        }
        requestAnimationFrame(loop);
      }

      document.getElementById("start").addEventListener("click", async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        await video.play();
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        loop();
      });
    </script>
  </body>
</html>
